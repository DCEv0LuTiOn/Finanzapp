<!DOCTYPE html>
<html>
    <header>
        <title>Log In</title>
        <meta charset="utf-8">
    </header>

    <style> 
        body{
            background-color: #c1ddff;
            margin: 0;
            display:flex;
            justify-content: center; /* horizontal zentrieren */
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .login-container{
            display: flex;
            flex-direction: column;
            flex: 0.1;  /* ist dafür verantwortlich, dass die Steuerelemente in der Klasse am rechten Rand aligned sind*/
            width: 300px;
            border-width:2px;
            padding: 10px;
            background-color: white; 
            border-style:solid;
            border-color:white;
            border-radius: 10px;
            margin-top: 200px; /**/
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
            flex-direction: column; /* Untereinander anordnen */
            /* gap: 10px;  */
        }
        .div-user{
            display: flex;
            align-items: center;
            /* width: 100%;  */
            gap:10px;
            margin-bottom: 5px;
        }
        .div-password{
            display: flex;
            align-items: center;
            gap:18px;
            margin-bottom: 10px; 
        }
        .div-button{
            display: flex;
            justify-content: flex-end; /*zeigt die Button auf der rechten Seite des log in divs an.*/
            align-items: center;
            gap:5px;
        }
    </style>
    <body style="align-content: center;">
            <div class="login-container">
                <label>Login:</label> 
                <br>
                <div class="div-user">
                    <label>E-Mail:</label> 
                    <input type="text" name="txt_email">
                </div>
                    <div class="div-password">
                        <label>Passwort:</label>
                        <input type="text" name="txt_password" >
                    </div>
                <div class="div-button">
                    <button>Sign Up</button>
                    <button>Log In</button>
                </div>
            </div>
    </body>
</html>
