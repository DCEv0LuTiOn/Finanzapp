<!DOCTYPE html>
<html>
    <header>
        <title>Log In</title>
        <meta charset="utf-8">
    </header>

    <style> 
        body{
            background-color: #c1ddff;
            margin: 0;
            display:flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .login-container{
            width: 300px;
            padding: 15px;
            background-color: white;
            border-radius: 10px;
            margin-top: 200px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-row{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row label{
            width: 80px; /* statische Breite, für sortiertes Layout untereinander */
            text-align: right;
        }

        .form-row input{
            flex: 1; /* füllt den restlichen Platz */
        }

        .div-btn-style{
            display: flex;
            justify-content: flex-end;
            gap: 5px;
        }

        .btn-style{
            background-color:white;
            border: 1px solid;
            border-color: black; 
        }

        .lbl-info{
            font-size:small;
            color:red;
        }
    </style>
    <body style="align-content: center;">
            <div class="login-container">
                <label>Login:</label>
                <label class="lbl-info" name="lblInfo">test</label>         
                <div class="form-row">
                    <label>E-Mail:</label>
                    <input type="text" name="txt_email">
                </div>
            
                <div class="form-row">
                    <label>Passwort:</label>
                    <input type="password" name="txt_password">
                </div>
            
                <div class="div-btn-style">
                    <button class="btn-style">Sign Up</button>
                    <button class="btn-style">Log In</button>
                </div>
            </div>
    </body>
</html>
