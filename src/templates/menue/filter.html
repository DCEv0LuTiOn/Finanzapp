<!-- Filter Panel -->
<div class="filter-panel">
    <h3>⚙️ Filterung der Daten</h3>
    <form method="POST" action="{{ url_for('menue') }}">
        <div class="filter-section">
            <label>Filter-Vorlagen</label>
            <div class="filter-presets">
                <button type="submit" class="preset-btn" name="filter_btn" value="this_Month">Dieses Monat</button>
                <button type="submit" class="preset-btn" name="filter_btn" value="last_30_days">Letzte 30 Tage</button>
            </div>
            <div class="filter-presets">
                <button type="submit" class="preset-btn" name="filter_btn" value="current_quarter">Dieses Quartal</button>
                <button type="submit" class="preset-btn" name="filter_btn" value="this_year">Dieses Jahr</button>
            </div>
            <div class="filter-presets">
                <button type="submit" class="preset-btn" name="filter_btn" value="last_year">Letztes Jahr</button>
                <button type="submit" class="preset-btn" name="filter_btn" value="all">Alles</button>
            </div>
        </div>

        <div class="filter-section">
            <label>Benutzerdefinierte Datumsbereich</label>
            <label style="font-weight: normal; margin-top: 8px;">Startdatum:</label>
            <input type="date" name="start_date" value="{{ start_date or '' }}">
            <label style="font-weight: normal; margin-top: 8px;">Enddatum:</label>
            <input type="date" name="end_date" value="{{ end_date or '' }}">
        </div>

        <div class="filter-section">
            <label>Konten</label>
            <div class="checkbox-group">
                {% for konto in konten %}
                    <label><input type="checkbox" name="konto" value="{{ konto.IBAN }}" {% if konto.IBAN|string in selected_konten %}checked{% endif %}> {{ konto.Konto_Name }}</label>
                {% endfor %}
            </div>
        </div>
        <div class="filter-section">
            <label>Kategorie</label>
            <div class="checkbox-group">
                {% for kategorie in kategorien %}
                    <label><input type="checkbox" name="kategorie" value="{{ kategorie.ID }}" {% if kategorie.ID|string in selected_kategorien %}checked{% endif %}> {{ kategorie.Bezeichnung }}</label>
                    {% endfor %}
                <label><input type="checkbox" name="kategorie" value="null" {% if "null" in selected_kategorien %}checked{% endif %}>Keine Kategorie</label>
            </div>
        </div>
        <button type="submit" class="apply-filters-btn" name="filter_btn" value="filter_apply">Filter anwenden</button>
    </form>
</div>
