<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Finanzapp - Menü</title>
        
        <link rel="stylesheet" href="{{ url_for('static', filename='css/navigation.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/menue/menue.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/menue/filter.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/menue/chart.css') }}">
    </head>
    <body>
        {% include 'navigation.html' %}
        
        <div class="main-container">
            {% include 'menue/filter.html' %}
            
            <main class="main-container-data">
                
                <section class="stats-container">
                    <div class="stat-box">
                        <div class="stat-title">Kontostand</div>
                        <div class="stat-value">{{ kontostand | round(2) }} €</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-title">Ausgaben insgesamt</div>
                        <div class="stat-value" style="color: #e74c3c;">
                            {{ ausgaben_summe | round(2) }} €
                        </div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-title">Einnahmen insgesamt</div>
                        <div class="stat-value" style="color: #27ae60;">
                            {{ einnahmen_summe | round(2) }} €
                        </div>
                    </div>
                </section>

                <div id="chart-data-bridge" 
                     data-json='{{ kategorie_dict | tojson }}' 
                     style="display:none;">
                </div>
                <div class="menue-container-charts">
                    
                    <div class="charts-column">
                        <div class="chart-card">
                            <h3>Ausgaben</h3>
                            <div class="canvas-wrapper">
                                <canvas id="chartAusgaben"></canvas>
                            </div>
                        </div>
                        <div class="chart-card">
                            <h3>Einnahmen</h3>
                            <div class="canvas-wrapper">
                                <canvas id="chartEinnahmen"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="chart-card bar-card"> 
                        <h3>Gewinn / Verlust pro Kategorie</h3>
                        <div class="canvas-wrapper bar-wrapper">
                            <!-- HTML Canvas erstellen mit ID befüllt wir später über js skript -->
                            <canvas id="chartSaldo"></canvas>
                        </div>
                    </div>

                </div>
            </main>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="{{ url_for('static', filename='js/chart_logic.js') }}"></script>
        
        <script>
            // Eventlistener bei Start der 
            document.addEventListener('DOMContentLoaded', function() {
                // bridge ist das Div das aus der ID chart-data-bridge gespeichert wird
                const bridge = document.getElementById('chart-data-bridge');
                // wenn bridge und bridge.dataset gefüllt ist führt er die If aus (bridge.dataset = kategorie_dict aus server.py)
                if (bridge && bridge.dataset.json) {
                    try {
                        const data = JSON.parse(bridge.dataset.json);
                        // Diese Funktion kommt aus deiner chart_logic.js und erstellt die Canvas Objekte, welche über die ID befüllt werden.(Canvas = Platzhalter für Grafik Objekte)
                        initFinanceChartsFromDict(data);
                    } catch (e) {
                        console.error("Fehler beim Initialisieren der Charts:", e);
                    }
                }
            });
        </script>
    </body>
</html>
