<!DOCTYPE html>
<html>
    <header>
        <title>Sign Up</title>
        <meta charset="utf-8">
    </header>

    <style> 
        body{
            background-color: #c1ddff;
            margin: 0;
            display:flex;
            justify-content: center; /* horizontal zentrieren */
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .signup-container{
            width: 300px;
            padding: 15px;
            background-color: white;
            border-radius: 10px;
            margin-top: 200px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .div-btn-style{
            display: flex;
            justify-content: flex-end;
        }

        .btn-style{
            background-color:white;
            border: 1px solid;
            border-color: black; 
            
        }

        .form-row{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row label{
            width: 80px; /* statische Breite, für sortiertes Layout untereinander */
            text-align: right;
        }

        .form-row input{
            flex: 1; /* füllt den restlichen Platz */
        }

        .lbl-info{
            font-size:small; /*damit die info kleiner Angezeigt wird */
            color:red;
        }
    
    </style>
    <body style="align-content: center;">
            <div class="signup-container">
                <label>Sigh Up:</label> 
                <label class="lbl-info" name="lblInfo">test</label>         
                <div class="form-row">
                    <label>Vorname:</label> 
                    <input type="text" name="txt_vorname">
                </div>

                <div class="form-row">
                    <label>Nachname:</label> 
                    <input type="text" name="txt_nachname">
                </div>

                <div class="form-row">
                    <label>eMail:</label> 
                    <input type="text" name="txt_email">
                </div>

                <div class="form-row">
                    <label>Passwort:</label>
                    <input type="text" name="txt_password" >
                </div>

                <div class="form-row" class>
                    <label>w.Passwort:</label>
                    <input type="text" name="txt_best_password" >
                </div>

                <div class="div-btn-style">
                    <button class="btn-style">Sign Up</button>
                </div>
            </div>
    </body>
</html>
