<!DOCTYPE html>
<html>
    <head>
        <title>Diagramme</title>
    <meta charset="utf-8">

        <style> 
            body{
                background-color: #c1ddff;
                margin: 0;
                display:flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
            }

            .main-container{
                display:flex;
                flex-direction:column;
                gap:25px;
                margin-top: 5%;
            }

            .btn-style{
                background-color:white;
                border: 1px solid;
                border-color: black; 
            }
            /* Filterbereich */

            .filter-container{
                background:white;
                padding:15px;
                border-radius:10px;
                box-shadow:5px 5px 15px rgba(0,0,0,0.3);
                display:flex;
                gap:20px;
                justify-content:center;
                align-items:center;
            }

            /* Statistikbereich */

            .stats-container{
                background:white;
                padding:20px;
                border-radius:10px;
                box-shadow:5px 5px 15px rgba(0,0,0,0.3);
                display:flex;
                justify-content:space-around;
                text-align:center;
            }

            .stat-box{
                padding:10px 20px;
            }

            .stat-title{
                font-weight:bold;
                margin-bottom:5px;
            }

            .stat-value{
                font-size:20px;
                color:#2c6ed5;
            }

            /* Diagrammcontainer */

            .menue-container{
                display: flex;
                flex-direction: row;
                gap: 60px;
                padding: 30px;
                background-color: white; 
                border-radius: 10px;
                box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            }

            .diagram{
                display:flex;
                flex-direction: column;
                align-items: center;
            }

            /* Kuchendiagramm */

            .piechart{
                width:200px;
                height:200px;
                border-radius:50%;
                box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
                background: conic-gradient(
                    red 0% 25%,
                    blue 25% 60%,
                    yellow 60% 75%,
                    green 75% 100%
                );
            }

            /* Balkendiagramm */

            .bar-container{
                display:flex;
                justify-content: space-around;
                align-items:flex-end;
                height:200px;
                border-left:2px solid black;
                border-bottom:2px solid black;
                padding:10px;
                gap:15px;

            }

            .bar{
                width:40px;
                background-color:#4a90e2;
            }

            .bar1{ height:60px; box-shadow: 5px 5px 15px rgba(0,0,0,0.6);}
            .bar2{ height:140px; box-shadow: 5px 5px 15px rgba(0,0,0,0.6);}
            .bar3{ height:90px; box-shadow: 5px 5px 15px rgba(0,0,0,0.6);}
            .bar4{ height:170px; box-shadow: 5px 5px 15px rgba(0,0,0,0.6);}

            .label{
                text-align:center;
                margin-top:5px;
            }

        </style>
    </head>
    <body>
    <div class="main-container">

        <!-- Filter -->
        <div class="filter-container">
            <label>Jahr:</label>
            <select>
                <option>2022</option>
                <option>2023</option>
                <option>2024</option>
            </select>
            <label>Monat:</label>
            <select>
                <option>Alle</option>
                <option>Januar</option>
                <option>Februar</option>
                <option>März</option>
            </select>
            <button class="btn-style">Filter anwenden</button>
        </div>
        
        <!-- Aktuelle Daten -->
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-title">Kontostand</div>
                    <div class="stat-value">2.350 €</div>
                </div>
            <div class="stat-box">
                <div class="stat-title">Ausgaben insgesamt</div>
                <div class="stat-value">1.120 €</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Einnahmen insgesamt</div>
                <div class="stat-value">3.470 €</div>
            </div>
        </div>

        <!-- Diagramme -->
        <div class="menue-container">
            <div class="diagram">
                <h2>Kuchendiagramm</h2>
                <div class="piechart"></div>
            </div>
            <div class="diagram">
                <h2>Balkendiagramm</h2>
                <div class="bar-container">
                    <div>
                        <div class="bar bar1"></div>
                        <div class="label">Jan</div>
                    </div>
                    <div>
                        <div class="bar bar2"></div>
                        <div class="label">Feb</div>
                    </div>
                    <div>
                        <div class="bar bar3"></div>
                        <div class="label">Mär</div>
                    </div>
                    <div>
                        <div class="bar bar4"></div>
                        <div class="label">Apr</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
