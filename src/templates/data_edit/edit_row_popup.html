<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closePopup()">&times;</span>
        <h3>📝 Transaktion bearbeiten</h3>
        <hr>
        
        <form action="{{ url_for('update_transaktion') }}" method="POST">
            <input type="hidden" id="edit-id" name="id">
            
            <div class="input-group">
                <label>IBAN Zahlungsbeteiligter:</label>
                <input type="text" id="edit-iban-beteiligter" name="iban_beteiligter">
            </div>

            <div class="input-group">
                <label>Name Zahlungsbeteiligter:</label>
                <input type="text" id="edit-name-beteiligter" name="name_beteiligter">
            </div>

            <div class="input-group">
                <label>Verwendungszweck:</label>
                <input type="text" id="edit-zweck" name="verwendungszweck">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Betrag (€):</label>
                    <input type="number" step="0.01" id="edit-betrag" name="betrag">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Datum:</label>
                    <input type="date" id="edit-datum" name="datum">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Buchungsart:</label>
                    <select id="edit-buchungsart" name="buchungsart_id">
                        {% for art in buchungsarten %}
                            <option value="{{ art.ID }}">{{ art.Buchungsart }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Kategorie:</label>
                    <select id="edit-kategorie" name="kategorie_id">
                        <option value="null">Keine Kategorie</option>
                        {% for kat in kategorien %}
                            <option value="{{ kat.ID }}">{{ kat.Bezeichnung }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Bemerkung:</label>
                <textarea id="edit-bemerkung" name="bemerkung" rows="2" style="width: 100%; box-sizing: border-box; padding: 8px; border-radius: 4px; border: 1px solid #ddd;"></textarea>
            </div>

            <button type="submit" class="btn-green" style="width: 100%; margin-top: 15px; padding: 12px; font-weight: bold;">
                Speichern
            </button>
        </form>
    </div>
</div>
